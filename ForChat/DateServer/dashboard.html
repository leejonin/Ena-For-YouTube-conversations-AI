<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이나 대화 모니터</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --panel: #13161e;
    --border-blue: #2a7fff;
    --border-red: #8b1a1a;
    --border-yellow: #c8a800;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --text-muted: #94a3b8;
    --accent: #2a7fff;
    --success: #22c55e;
    --warning: #f59e0b;
    --danger: #ef4444;
    --process-active: #2a7fff;
    --process-done: #22c55e;
    --process-idle: #1e2535;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Noto Sans KR', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* ── 헤더 ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px;
  }
  header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--border-blue);
    font-family: var(--mono);
  }
  .server-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text-dim);
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--danger);
    box-shadow: 0 0 6px var(--danger);
    transition: all .4s;
  }
  .dot.online { background: var(--success); box-shadow: 0 0 6px var(--success); }

  /* ── 하단 3패널 ── */
  .panels {
    display: grid;
    grid-template-columns: 220px 1fr 300px;
    gap: 14px;
    flex: 1;
    min-height: 420px;
  }

  .panel {
    border-radius: 10px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow: hidden;
  }
  .panel-red {
    border: 1.5px solid var(--border-red);
    background: rgba(139,26,26,0.04);
  }
  .panel-maroon {
    border: 1.5px solid var(--border-red);
    background: rgba(139,26,26,0.04);
  }
  .panel-yellow {
    border: 1.5px solid var(--border-yellow);
    background: rgba(200,168,0,0.04);
  }

  .panel-title {
    font-size: 11px;
    font-family: var(--mono);
    letter-spacing: 0.1em;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .panel-red .panel-title, .panel-maroon .panel-title { color: var(--border-red); }
  .panel-yellow .panel-title { color: var(--border-yellow); }

  /* 대화 목록 */
  .conv-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .conv-list::-webkit-scrollbar { width: 3px; }
  .conv-list::-webkit-scrollbar-thumb { background: var(--border-red); border-radius: 2px; }

  .conv-item {
    padding: 8px 10px;
    border-radius: 6px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    cursor: pointer;
    transition: all .2s;
    font-size: 11.5px;
  }
  .conv-item:hover {
    background: rgba(139,26,26,0.15);
    border-color: var(--border-red);
  }
  .conv-item.selected {
    background: rgba(139,26,26,0.2);
    border-color: var(--border-red);
  }
  .conv-item-time {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .conv-item-summary {
    color: var(--text-muted);
    line-height: 1.4;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  /* 상세 보기 */
  .detail-content {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .detail-content::-webkit-scrollbar { width: 3px; }
  .detail-content::-webkit-scrollbar-thumb { background: var(--border-red); border-radius: 2px; }

  .detail-empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 12px;
    font-family: var(--mono);
    text-align: center;
    opacity: 0.5;
  }

  .msg-block {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .msg-role {
    font-size: 10px;
    font-family: var(--mono);
    letter-spacing: 0.08em;
    color: var(--text-dim);
  }
  .msg-role.dev { color: var(--accent); }
  .msg-role.ai { color: var(--success); }
  .msg-bubble {
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.6;
  }
  .msg-bubble.dev {
    background: rgba(42,127,255,0.08);
    border: 1px solid rgba(42,127,255,0.2);
  }
  .msg-bubble.ai {
    background: rgba(34,197,94,0.06);
    border: 1px solid rgba(34,197,94,0.15);
  }
  .summation-box {
    padding: 8px 12px;
    border-radius: 6px;
    background: rgba(200,168,0,0.08);
    border: 1px solid rgba(200,168,0,0.2);
    font-size: 11.5px;
    color: var(--border-yellow);
    font-family: var(--mono);
  }

  /* 검색창 */
  .search-row {
    display: flex;
    gap: 6px;
  }
  .search-input {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(139,26,26,0.4);
    border-radius: 6px;
    padding: 7px 10px;
    color: var(--text);
    font-size: 12px;
    font-family: var(--sans);
    outline: none;
    transition: border .2s;
  }
  .search-input:focus { border-color: var(--border-red); }
  .search-input::placeholder { color: var(--text-dim); }
  .search-btn {
    padding: 7px 12px;
    border-radius: 6px;
    background: rgba(139,26,26,0.3);
    border: 1px solid var(--border-red);
    color: var(--border-red);
    font-size: 12px;
    cursor: pointer;
    transition: all .2s;
    font-family: var(--mono);
  }
  .search-btn:hover { background: rgba(139,26,26,0.5); }

  /* 로그 패널 */
  .log-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .log-list::-webkit-scrollbar { width: 3px; }
  .log-list::-webkit-scrollbar-thumb { background: var(--border-yellow); border-radius: 2px; }

  .log-item {
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.5;
    padding: 4px 6px;
    border-radius: 4px;
    border-left: 2px solid transparent;
    color: var(--text-muted);
    word-break: break-all;
  }
  .log-item.info { border-color: var(--border-blue); color: #7eb8ff; }
  .log-item.success { border-color: var(--success); color: #86efac; }
  .log-item.warn { border-color: var(--border-yellow); color: var(--border-yellow); }
  .log-item.error { border-color: var(--danger); color: #fca5a5; }

  .log-time {
    color: var(--text-dim);
    margin-right: 6px;
  }

  .refresh-row {
    display: flex;
    gap: 6px;
  }
  .btn-small {
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid var(--border-yellow);
    background: rgba(200,168,0,0.08);
    color: var(--border-yellow);
    font-size: 11px;
    cursor: pointer;
    font-family: var(--mono);
    transition: all .2s;
  }
  .btn-small:hover { background: rgba(200,168,0,0.2); }

  .clear-btn {
    margin-left: auto;
    border-color: var(--text-dim);
    color: var(--text-dim);
    background: transparent;
  }
  .clear-btn:hover { color: var(--danger); border-color: var(--danger); background: rgba(239,68,68,0.08); }

  /* 검색 결과 */
  .search-result {
    padding: 10px;
    border-radius: 6px;
    background: rgba(200,168,0,0.06);
    border: 1px solid rgba(200,168,0,0.2);
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .search-result .result-header {
    color: var(--border-yellow);
    font-family: var(--mono);
    font-size: 10px;
    margin-bottom: 6px;
  }

  /* 빈 상태 */
  .empty-msg {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    font-size: 11px;
    font-family: var(--mono);
    opacity: 0.4;
    text-align: center;
    line-height: 1.8;
  }
</style>
</head>
<body>

<header>
  <h1>▸ NINA MONITOR</h1>
  <div class="server-status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">연결 확인 중...</span>
  </div>
</header>

<!-- 하단 3패널 -->
<div class="panels">

  <!-- 대화 내용 -->
  <div class="panel panel-red">
    <div class="panel-title">◈ 대화 내용</div>
    <div class="search-row">
      <input class="search-input" id="keywordInput" type="text" placeholder="키워드 검색...">
      <button class="search-btn" onclick="searchKeyword()">검색</button>
    </div>
    <div class="conv-list" id="convList">
      <div class="empty-msg">데이터 로딩 중...</div>
    </div>
  </div>

  <!-- 대화내용 상세보기 -->
  <div class="panel panel-maroon">
    <div class="panel-title">◈ 대화내용 상세보기</div>
    <div class="detail-content" id="detailContent">
      <div class="detail-empty">← 왼쪽에서 대화를 선택하세요</div>
    </div>
  </div>

  <!-- 실시간 로그 보기 -->
  <div class="panel panel-yellow">
    <div class="panel-title">◈ 실시간 로그</div>
    <div class="refresh-row">
      <button class="btn-small" onclick="checkHealth()">▶ 서버 확인</button>
      <button class="btn-small" onclick="loadConversations()">↻ 새로고침</button>
      <button class="btn-small clear-btn" onclick="clearLogs()">✕ 로그 초기화</button>
    </div>
    <div class="log-list" id="logList">
      <div class="log-item info"><span class="log-time">--:--:--</span>모니터 시작됨</div>
    </div>
  </div>

</div>

<script>
const BASE = 'http://127.0.0.1:5000';
let allEntries = [];
let selectedIdx = null;
let processTimer = null;

// ── 로그 ──
function addLog(msg, type='info') {
  const list = document.getElementById('logList');
  const now = new Date().toTimeString().slice(0,8);
  const el = document.createElement('div');
  el.className = `log-item ${type}`;
  el.innerHTML = `<span class="log-time">${now}</span>${msg}`;
  list.appendChild(el);
  list.scrollTop = list.scrollHeight;
  // 최대 200줄
  while (list.children.length > 200) list.removeChild(list.firstChild);
}
function clearLogs() {
  document.getElementById('logList').innerHTML = '';
  addLog('로그 초기화됨', 'warn');
}

// ── 서버 상태 ──
async function checkHealth() {
  try {
    const r = await fetch(`${BASE}/health`);
    const d = await r.json();
    document.getElementById('statusDot').classList.add('online');
    document.getElementById('statusText').textContent = '서버 온라인';
    addLog(`서버 정상 | ${d.timestamp}`, 'success');
  } catch(e) {
    document.getElementById('statusDot').classList.remove('online');
    document.getElementById('statusText').textContent = '서버 오프라인';
    addLog(`서버 연결 실패: ${e.message}`, 'error');
  }
}

// ── 프로세스 애니메이션 ──
function animateProcess(onComplete) {
  // 초기화
  for (let i = 0; i < 5; i++) {
    document.getElementById(`step${i}`).className = 'step-box';
    document.getElementById(`lbl${i}`).className = 'step-label';
  }
  for (let i = 0; i < 4; i++) {
    document.getElementById(`arr${i}`).classList.remove('lit');
  }

  let cur = 0;
  function next() {
    if (cur > 0) {
      document.getElementById(`step${cur-1}`).className = 'step-box done';
      document.getElementById(`lbl${cur-1}`).className = 'step-label done';
      if (cur-1 < 4) document.getElementById(`arr${cur-1}`).classList.add('lit');
    }
    if (cur >= 5) { onComplete && onComplete(); return; }
    document.getElementById(`step${cur}`).className = 'step-box active';
    document.getElementById(`lbl${cur}`).className = 'step-label active';
    cur++;
    setTimeout(next, 600);
  }
  next();
}

// ── 대화 목록 로드 ──
async function loadConversations() {
  try {
    addLog('대화 목록 로딩...', 'info');
    const r = await fetch(`${BASE}/get_all`);
    const d = await r.json();
    if (d.success) {
      allEntries = d.entries || [];
      renderConvList(allEntries);
      addLog(`대화 ${allEntries.length}건 로딩 완료`, 'success');
    } else {
      allEntries = [];
      renderConvList([]);
      addLog('대화 데이터 없음', 'warn');
    }
  } catch(e) {
    addLog(`대화 로딩 실패: ${e.message}`, 'error');
    renderConvList([]);
  }
}

function renderConvList(entries) {
  const list = document.getElementById('convList');
  if (!entries.length) {
    list.innerHTML = '<div class="empty-msg">저장된 대화가 없습니다</div>';
    return;
  }
  list.innerHTML = '';
  entries.forEach((e, i) => {
    const el = document.createElement('div');
    el.className = 'conv-item' + (i === selectedIdx ? ' selected' : '');
    el.innerHTML = `
      <div class="conv-item-time">${formatTime(e.time)}</div>
      <div class="conv-item-summary">${e.summation || e.dv_input || '(내용 없음)'}</div>
    `;
    el.onclick = () => selectEntry(i, entries);
    list.appendChild(el);
  });
}

function formatTime(t) {
  if (!t) return '--';
  // YYYY-MM-DD-HH-mm-ss → YYYY.MM.DD HH:mm
  const p = t.split('-');
  if (p.length >= 5) return `${p[0]}.${p[1]}.${p[2]} ${p[3]}:${p[4]}`;
  return t;
}

function selectEntry(i, entries) {
  selectedIdx = i;
  // 하이라이트
  document.querySelectorAll('.conv-item').forEach((el, idx) => {
    el.classList.toggle('selected', idx === i);
  });
  renderDetail(entries[i]);
}

function renderDetail(e) {
  const el = document.getElementById('detailContent');
  el.innerHTML = `
    <div class="summation-box">📌 ${e.summation || '요약 없음'}</div>
    <div class="msg-block">
      <div class="msg-role dev">▸ 개발자 · ${formatTime(e.time)}</div>
      <div class="msg-bubble dev">${nl2br(e.dv_input || '')}</div>
    </div>
    <div class="msg-block">
      <div class="msg-role ai">▸ AI (이나)</div>
      <div class="msg-bubble ai">${nl2br(e.nin_response || '')}</div>
    </div>
  `;
  addLog(`대화 상세 표시: ${formatTime(e.time)}`, 'info');
}

function nl2br(str) {
  return str.replace(/\n/g, '<br>');
}

// ── 키워드 검색 ──
async function searchKeyword() {
  const kw = document.getElementById('keywordInput').value.trim();
  if (!kw) { loadConversations(); return; }

  addLog(`키워드 검색: "${kw}"`, 'info');
  animateProcess(null);

  try {
    const r = await fetch(`${BASE}/search`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({keyword: kw})
    });
    const d = await r.json();

    if (d.success && d.found) {
      allEntries = d.matches;
      renderConvList(allEntries);
      addLog(`검색 완료: ${allEntries.length}건 찾음`, 'success');

      // 상세 패널에 GPT 답변 표시
      const detail = document.getElementById('detailContent');
      detail.innerHTML = `
        <div class="search-result">
          <div class="result-header">🔍 GPT 분석 결과 · "${kw}"</div>
          ${nl2br(d.gpt_answer || d.reason)}
        </div>
        <div style="font-size:11px;color:var(--text-dim);font-family:var(--mono);padding:4px 0;">${d.reason}</div>
      `;
    } else {
      renderConvList([]);
      addLog(`검색 결과 없음: "${kw}"`, 'warn');
      document.getElementById('detailContent').innerHTML = `
        <div class="detail-empty">"${kw}" 관련 대화를 찾지 못했습니다</div>
      `;
    }
  } catch(e) {
    addLog(`검색 오류: ${e.message}`, 'error');
  }
}

// 엔터 키 검색
document.getElementById('keywordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchKeyword();
});

// ── 자동 폴링 (5초마다 서버 상태 확인) ──
setInterval(checkHealth, 5000);

// ── 초기화 ──
(async () => {
  await checkHealth();
  await loadConversations();
})();
</script>
</body>
</html>
